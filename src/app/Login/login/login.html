<div class="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="shell">

  <!-- ══════════ LEFT PANEL ══════════ -->
  <app-forge-reel></app-forge-reel>

  <!-- ══════════ RIGHT PANEL ══════════ -->
  <div class="right-panel">
    <div class="auth-card">

     

      <!-- ══ LOGIN PAGE ══ -->
      <div id="page-login">

        <!-- Default login form -->
        <div id="login-form-view">
          <div class="auth-header">
            <div class="auth-title">Welcome back</div>
            <div class="auth-sub">Sign in to your FORGE account to continue.</div>
          </div>

          <!-- Username -->
          <div class="form-group">
            <form
             (ngSubmit)="handleSubmit()">
            <label class="form-label">Email</label>
            <div class="input-wrap">
              <span class="input-icon">👤</span>
              <input name="Email" type="email" class="form-input" id="login-user" placeholder="Email" name="email" [(ngModel)]="Login.email"/>
            </div>
            <div class="field-hint" id="login-user-hint"></div>
          

          <!-- Password -->
          <div class="form-group">
            <label class="form-label">
              Password
              <a href="#" onclick="showForgot();return false;">Forgot password?</a>
            </label>
            <div class="input-wrap">
              <span class="input-icon">🔐</span>
              <input type="password" class="form-input" id="login-pass" placeholder="Your password" name="password" [(ngModel)]="Login.password"/>
              <button class="eye-btn" onclick="toggleEye('login-pass',this)">👁</button>
            </div>
            <div class="field-hint" id="login-pass-hint"></div>
          </div>

          <!-- Remember me -->
          <div class="checkbox-row">
            <div class="custom-check" id="remember-check" onclick="this.classList.toggle('checked')"></div>
            <div class="check-label">Keep me signed in for 30 days</div>
          </div>

          <!-- Submit -->
          <button type="submit" class="submit-btn" id="login-btn">
            <span class="btn-text">Sign In</span>
            <span class="btn-spinner"></span>
          </button>
          </form>
      </div>
